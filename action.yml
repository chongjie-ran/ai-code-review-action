name: "CodeLens AI Code Review"
description: "AI-powered code review for your PRs. Detects security vulnerabilities, logic errors, and tech debt."
author: "chongjie-ran"
branding:
  icon: "shield-check"
  color: "green"

inputs:
  github-token:
    description: "GitHub token for API access (use ${{ secrets.GITHUB_TOKEN }})"
    required: true
  codelens-api-key:
    description: "Your CodeLens API key"
    required: true
  codelens-api-url:
    description: "CodeLens backend API URL"
    required: false
    default: "https://api.codelens.ai"
  min-score:
    description: "Minimum quality score (0-100)"
    required: false
    default: "0"
  fail-on-high:
    description: "Fail workflow if high-severity issues found"
    required: false
    default: "false"

runs:
  using: "docker"
  image: "docker://ghcr.io/chongjie-ran/ai-code-review-action:v1.1"
  env:
    GITHUB_TOKEN: ${{ inputs.github-token }}
    CODELENS_API_KEY: ${{ inputs.codelens-api-key }}
    CODELENS_API_URL: ${{ inputs.codelens-api-url }}
    MIN_SCORE: ${{ inputs.min-score }}
    FAIL_ON_HIGH: ${{ inputs.fail-on-high }}
